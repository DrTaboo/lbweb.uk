{{ define "main" }}
<style>
  .layout-basic, .max-w-prose, .prose {
    max-width: 100% !important;
  }
  main {
    max-width: 100% !important;
    padding: 0 !important;
  }
</style>
<div style="position: relative; width: 100%; min-height: 100vh;">

  {{/* Background image - blurred */}}
  <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; 
              background: url('/images/background.jpg') no-repeat center center; 
              background-size: cover;
              filter: blur(6px); transform: scale(1.05);">
  </div>

  {{/* Dark overlay */}}
  <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; 
              background: rgba(20, 10, 15, 0.55);">
  </div>

  {{/* Content */}}
  <div style="width: 100%; padding: 30px 0%; box-sizing: border-box; position: relative; z-index: 1;">
    <header style="margin-bottom: 2rem;">
      <h1 style="font-size: 4rem; font-weight: 900; color: white; margin: 0;">
        {{ .Title }}
      </h1>
    </header>
      
    <div class="prose dark:prose-invert" style="max-width: 100%;">
      {{ .Content }}
    </div>
  </div>

</div>
{{ end }}
